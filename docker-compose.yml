# ============================================================
# DocuMind — Docker Compose
# Owner: Aaron (Backend) + Akhil (Frontend)
# Purpose: Orchestrates backend (FastAPI), frontend (React/Vite),
#          and Ollama (LLM inference) services
# ============================================================

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      # Ollama connection
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      # RAG tuning
      - RELEVANCE_THRESHOLD=0.3
      # Auth — CHANGE THIS IN PRODUCTION
      - JWT_SECRET_KEY=change-this-to-a-long-random-secret-in-production
      - TOKEN_EXPIRY_HOURS=24
      # Security — 5 requests per minute per IP
      - RATE_LIMIT_PER_MINUTE=5
      # API key auth (optional — leave empty to disable)
      - DOCUMIND_API_KEY=
    volumes:
      - vector_data:/app/vector_data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
  vector_data:
